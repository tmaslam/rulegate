<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="RuleGate">
  <!-- The mark is the product: a request arrives, the gate stops it.
       Only two shapes, so it still reads at 16px in a browser tab.

       Values are hard-coded because a favicon has no CSS to inherit. They must
       track --accent-solid (#2563eb) and --accent-fg (#fff) in globals.css;
       white on blue-600 is 5.17:1. The in-app mark (components/landing/Logo.tsx)
       reads the tokens instead, so change both together. -->
  <rect width="32" height="32" rx="7.5" fill="#2563eb"/>
  <!-- the request, halted -->
  <circle cx="10.5" cy="16" r="3.25" fill="#ffffff"/>
  <!-- the gate -->
  <rect x="18" y="6.5" width="4.5" height="19" rx="2.25" fill="#ffffff"/>
</svg>

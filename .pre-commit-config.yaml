# Copy to each repo root as `.pre-commit-config.yaml`. No placeholders.
# Install once per repo:  uv run pre-commit install
# Run over everything:    uv run pre-commit run --all-files
#
# Note: hooks run the pinned tool versions below, NOT the versions in your
# .venv. Keep these roughly in step with pyproject.toml's dev group so local
# and CI agree.

default_language_version:
  python: python3.12

# Keep hooks off generated/vendored trees.
exclude: '^(\.venv/|dist/|build/|node_modules/|.*\.lock$)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        # Disk is tight (~30GB free) and models/datasets must not enter git.
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: check-case-conflict       # Windows/macOS devs, Linux CI
      - id: check-toml
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=md"]
      - id: mixed-line-ending
        # Repo is LF-normalised; Git Bash on Windows checks out LF via
        # .gitattributes. Keep hooks from fighting the editor.
        args: ["--fix=lf"]
      - id: debug-statements
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        args: ["--strict", "--ignore-missing-imports"]
        # mypy's hook runs in an isolated env; it needs the typed deps that
        # appear in our public signatures or it reports phantom errors.
        additional_dependencies:
          - pydantic>=2.9.0
          - pydantic-settings>=2.6.0
          - httpx>=0.27.0
          - opentelemetry-api>=1.29.0
          - opentelemetry-sdk>=1.29.0
        # Type-check the package and the spine modules only. Tests are checked
        # by the `make lint` mypy run, which sees the real resolved env.
        files: ^(src/|llm/|obs/|guardrails/|evals/|fakes/)

  # Secret scanning. .env.example is the ONLY env file that may be committed;
  # .gitignore blocks the rest, and this is the belt to that suspenders.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

ci:
  autofix_prs: false
  autoupdate_schedule: monthly
